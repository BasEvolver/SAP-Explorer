<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SAP Relationship Tester</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 30px; background: #f9f9f9; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 900px; margin: auto; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 5px; width: 100%; }
        button { background: #0062cc; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #004a9b; }
        pre { background: #272822; color: #f8f8f2; padding: 15px; border-radius: 8px; max-height: 400px; overflow-y: auto; }
        .label { font-size: 0.85rem; color: #666; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div class="card">
    <h2>SAP DD08L Relationship Tester</h2>
    
    <div class="controls">
        <div>
            <span class="label">Table Prefix (e.g., VB*)</span>
            <input type="text" id="filterPrefix" placeholder="Enter Prefix..." value="VB*">
        </div>
        <div>
            <span class="label">Row Limit (Testing)</span>
            <input type="number" id="rowLimit" value="50">
        </div>
    </div>

    <button id="testBtn">Execute Test Extraction</button>

    <p id="status">Status: Awaiting Trigger</p>
    <pre id="output">Results will appear here...</pre>
</div>

<script>
    document.getElementById('testBtn').addEventListener('click', async () => {
        const prefix = document.getElementById('filterPrefix').value.replace('*', '%');
        const limit = document.getElementById('rowLimit').value;
        const status = document.getElementById('status');
        const output = document.getElementById('output');

        status.textContent = `Status: Fetching first ${limit} records for ${prefix}...`;

        // The query logic to pass to your SAP middleware
        const payload = {
            table: "DD08L",
            rowcount: limit,
            options: `TABNAME LIKE '${prefix}'`
        };

        try {
            // Replace with your endpoint that calls RFC_READ_TABLE
            const response = await fetch('/api/sap-extract', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            output.textContent = JSON.stringify(data, null, 2);
            status.textContent = 'Status: Success';
        } catch (e) {
            status.textContent = 'Status: Error - ' + e.message;
        }
    });
</script>
</body>
</html>
